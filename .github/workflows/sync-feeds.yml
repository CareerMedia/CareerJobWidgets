name: Sync job feeds

on:
  schedule:
    # Daily at 6:00 AM Pacific (14:00 UTC)
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-feeds
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync feeds (server-side, no CORS)
        run: node scripts/sync-feeds.mjs
        env:
          # Optional: override Handshake URL from a GitHub secret instead of feeds.sync.json
          HANDSHAKE_CSUN_AMC_FEED_URL: ${{ secrets.HANDSHAKE_CSUN_AMC_FEED_URL }}

      - name: Commit updated feed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/feeds/
          if git diff --staged --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: sync job feed cache"
            git push
          fi

      - name: Trigger Pages deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
            });
