name: Admin save feed

on:
  workflow_dispatch:
    inputs:
      action:
        description: "upsert or delete"
        required: true
        type: choice
        options:
          - upsert
          - delete
      feed_json:
        description: "Feed JSON (full feed for upsert, or { id } for delete)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: admin-save-feed
  cancel-in-progress: false

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update feeds.sync.json
        run: node scripts/admin-update-feeds-sync.mjs
        env:
          ACTION: ${{ inputs.action }}
          FEED_JSON: ${{ inputs.feed_json }}

      - name: Sync feeds (server-side, no CORS)
        run: node scripts/sync-feeds.mjs
        env:
          HANDSHAKE_CSUN_AMC_FEED_URL: ${{ secrets.HANDSHAKE_CSUN_AMC_FEED_URL }}

      - name: Commit feed config and cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds.sync.json public/data/feeds/
          if git diff --staged --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore: admin feed save (${{ inputs.action }})"
            git push
          fi

      - name: Trigger Pages deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
            });
